<!DOCTYPE html>
<html>
<head>
    <title>VibeSync</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- PARTICLE BACKGROUND -->
<canvas id="particles"></canvas>

<div class="container">

    <h1>🎧 VibeSync</h1>

    <h2>Choose Your Vibe</h2>
    <button onclick="playSound('chill')">Chill 🌿</button>
    <button onclick="playSound('energy')">Energy ⚡</button>
    <button onclick="playSound('rain')">Rain 🌧️</button>

    <!-- AUDIO CONTROLS -->
    <div>
        <button onclick="toggleSound()">▶️ / ⏸️ Toggle</button>
        <button onclick="stopSound()">⏹️ Stop</button>
    </div>

    <p id="status">No sound playing</p>

    <h2>Chat with VibeBot 🤖</h2>

    <div id="chatbox"></div>

    <input type="text" id="userInput" placeholder="Type something...">
    <button onclick="sendMessage()">Send</button>

</div>

<script src="/static/script.js"></script>

</body>
</html>
